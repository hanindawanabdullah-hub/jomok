<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Guardian | AI Anti Hack System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b0f1a;color:white;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:#111827;}
.logo{font-weight:700;font-size:22px;color:#00f2ff;}
.container{padding:40px 60px;}
.card{background:#141b2d;padding:30px;border-radius:15px;margin-bottom:30px;box-shadow:0 0 20px rgba(0,242,255,0.1);}
h2{margin-bottom:20px;color:#00f2ff;}
textarea{width:100%;height:120px;padding:15px;border-radius:10px;border:none;background:#0f1626;color:white;}
button{margin-top:15px;padding:12px 25px;background:#00f2ff;border:none;border-radius:30px;font-weight:600;cursor:pointer;}
button:hover{box-shadow:0 0 15px #00f2ff;}
.result{margin-top:20px;font-weight:600;font-size:18px;}
.risk-high{color:#ff4d4d;}
.risk-medium{color:#ffcc00;}
.risk-low{color:#00ff88;}
.log{font-size:13px;line-height:1.6;color:#00ff99;max-height:150px;overflow:auto;background:#0f1626;padding:10px;border-radius:10px;}
canvas{background:#0f1626;border-radius:10px;padding:10px;}
</style>
</head>

<body>

<header>
<div class="logo">WA GUARDIAN AI</div>
</header>

<div class="container">

<div class="card">
<h2>Scan SMS / WhatsApp Text</h2>
<textarea id="inputText" placeholder="Tempel pesan mencurigakan di sini..."></textarea>
<button onclick="scanText()">Scan Sekarang</button>
<div id="result" class="result"></div>
</div>

<div class="card">
<h2>Statistik Deteksi</h2>
<canvas id="attackChart"></canvas>
</div>

<div class="card">
<h2>Log Aktivitas</h2>
<div class="log" id="logBox"></div>
</div>

</div>

<script>

// ==== KEYWORDS DATABASE ====
const phishingKeywords = [
"hadiah","klik link","verifikasi akun","akun diblokir",
"transfer sekarang","menang undian","gratis saldo",
"bank","pin","otp","kode verifikasi","whatsapp support",
"login dari perangkat baru","reset password","data anda"
];

const suspiciousDomains = [
".xyz",".top",".click",".gq",".ru",".tk"
];

let highCount = 0;
let mediumCount = 0;
let lowCount = 0;

// ==== CHART ====
const ctx = document.getElementById('attackChart').getContext('2d');
const attackChart = new Chart(ctx,{
type:'bar',
data:{
labels:['High Risk','Medium Risk','Low Risk'],
datasets:[{
label:'Detections',
data:[0,0,0],
backgroundColor:['#ff4d4d','#ffcc00','#00ff88']
}]
},
options:{
plugins:{legend:{labels:{color:'white'}}},
scales:{
x:{ticks:{color:'white'}},
y:{ticks:{color:'white'}}
}
}
});

// ==== DETECTION FUNCTION ====
function scanText(){

let text = document.getElementById("inputText").value.toLowerCase();
let score = 0;

phishingKeywords.forEach(keyword=>{
if(text.includes(keyword)){score += 15;}
});

suspiciousDomains.forEach(domain=>{
if(text.includes(domain)){score += 25;}
});

if(text.match(/http[s]?:\/\//)){score += 20;}
if(text.match(/\d{4,6}/) && text.includes("otp")){score += 30;}

let resultBox = document.getElementById("result");
let logBox = document.getElementById("logBox");

let status = "";
let className = "";

if(score >= 60){
status = "HIGH RISK - Kemungkinan Phishing / Hack WA!";
className = "risk-high";
highCount++;
notifyUser("⚠️ HIGH RISK terdeteksi!");
}
else if(score >= 30){
status = "MEDIUM RISK - Perlu waspada.";
className = "risk-medium";
mediumCount++;
}
else{
status = "LOW RISK - Aman.";
className = "risk-low";
lowCount++;
}

resultBox.innerHTML = "Skor Risiko: "+score+" → "+status;
resultBox.className = "result "+className;

updateChart();
addLog(status);
saveLog(status);
}

// ==== UPDATE CHART ====
function updateChart(){
attackChart.data.datasets[0].data = [highCount, mediumCount, lowCount];
attackChart.update();
}

// ==== LOG SYSTEM ====
function addLog(message){
let time = new Date().toLocaleTimeString();
let logBox = document.getElementById("logBox");
logBox.innerHTML += "["+time+"] "+message+"<br>";
logBox.scrollTop = logBox.scrollHeight;
}

function saveLog(message){
let logs = JSON.parse(localStorage.getItem("logs")) || [];
logs.push({time:new Date().toLocaleTimeString(), msg:message});
localStorage.setItem("logs",JSON.stringify(logs));
}

window.onload = function(){
let logs = JSON.parse(localStorage.getItem("logs")) || [];
logs.forEach(log=>{
addLog(log.msg);
});
}

// ==== NOTIFICATION ====
function notifyUser(message){
if(Notification.permission !== "granted"){
Notification.requestPermission();
}else{
new Notification("WA Guardian Alert",{body:message});
}
}

</script>

</body>
</html>
